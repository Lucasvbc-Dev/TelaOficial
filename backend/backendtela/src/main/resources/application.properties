# ==========================================
# 🏢 CONFIGURAÇÃO TELA E-COMMERCE
# ==========================================

# App
spring.application.name=backendtela
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JSON / dates
spring.jackson.time-zone=${APP_TIMEZONE:America/Sao_Paulo}

# Logging
logging.level.root=WARN
logging.level.backendtela=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# ==========================================
# ✅ CORS - Allow Frontend Origins
# ==========================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081,http://localhost:3000}

# ==========================================
# 🔥 Firebase - Database & Auth
# ==========================================
firebase.enabled=${FIREBASE_ENABLED:true}
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}

# For production, use absolute path or environment variable
# Example: /var/secrets/firebase-service-account.json
# Or upload to Firebase and use: classpath:firebase-service-account.json

# ==========================================
# 💳 Mercado Pago - Payment Gateway
# ==========================================
# Get these from: https://www.mercadopago.com.br/developers
# Keep PROD tokens only in production environment!

mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.public-key=${MERCADOPAGO_PUBLIC_KEY:}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
mercadopago.base-url=${MERCADOPAGO_BASE_URL:https://api.mercadopago.com}

# ==========================================
# 🔐 JWT Authentication
# ==========================================
# IMPORTANTE: Em produção, use uma chave com +32 caracteres aleatórios!
# Gere com: openssl rand -base64 32

auth.jwt.secret=${AUTH_JWT_SECRET:dev-secret-change-this-key-with-at-least-32-characters}
auth.jwt.expiration-minutes=${AUTH_JWT_EXPIRATION_MINUTES:1440}
auth.admin-emails=${AUTH_ADMIN_EMAILS:admin@tela.com}

# ==========================================
# 🛠️ Error Handling
# ==========================================
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING_ERRORS:never}
# Use 'always' apenas em desenvolvimento para debug

# ==========================================
# Profiles
# ==========================================
# Execute com: java -Dspring.profiles.active=prod -jar app.jar
# Ou: export SPRING_PROFILES_ACTIVE=prod

